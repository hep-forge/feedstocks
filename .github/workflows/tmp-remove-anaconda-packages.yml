name: TMP - Remove retired anaconda packages

# One-off cleanup for the rsignal/rh5-feedstock teardown: their GitHub
# repos are already deleted, this drops the matching anaconda.org
# packages entirely. Delete this workflow file after it has run once.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - name: Install anaconda-client
        run: pip install anaconda-client

      - name: Remove hep-forge/rsignal and hep-forge/rh5
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          for pkg in rsignal rh5; do
            echo "== removing hep-forge/$pkg =="
            anaconda -t "$ANACONDA_API_TOKEN" remove --force "hep-forge/$pkg" || echo "WARNING: remove failed for $pkg"
          done
