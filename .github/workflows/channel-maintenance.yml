name: Anaconda Channel Maintenance

# Keeps the hep-forge channel small and consistent (free-tier storage):
#
#   1. Label hygiene: `anaconda label`/`channel` is an ORG-WIDE operation
#      (see binstar_client/commands/channel.py -- it has no per-package
#      or per-file scoping at all), so the retired `master` label is
#      migrated to `main` in exactly two calls covering every package at
#      once, not a per-file loop.
#   2. Version trim, channel-wide: per package keep the newest
#      TRIM_KEEP non-dev versions plus any version carrying a label
#      other than main/master (branch lines like legacy/eic/cern/old,
#      and the explicit `keep` label, applied per-version with
#      `anaconda copy <org>/<pkg>/<version> --from-label main --to-label keep`
#      -- that command DOES take a package/version spec). Delete the
#      rest, including retired *dev* uploads.
#
# The publish job in each feedstock already trims its own package's
# versions after every release; this sweep additionally catches
# packages that rarely publish and does the one-time label migration.

on:
  schedule:
    - cron: '30 5 * * 1'   # Mondays, after the render-sync run
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only print the plan, delete nothing"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Install anaconda-client
        run: pip install anaconda-client

      - name: Label hygiene + version trim
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
          ORG: hep-forge
          TRIM_KEEP: "2"
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: |
          python3 <<'PYEOF'
          import json, os, re, subprocess, urllib.request

          ORG = os.environ["ORG"]
          KEEP_N = int(os.environ["TRIM_KEEP"])
          DRY = os.environ["DRY_RUN"] == "true"
          TOKEN = os.environ["ANACONDA_API_TOKEN"]

          def api(path):
              with urllib.request.urlopen(f"https://api.anaconda.org{path}", timeout=30) as r:
                  return json.load(r)

          def anaconda(*args):
              cmd = ["anaconda", "-t", TOKEN, *args]
              shown = " ".join(["anaconda", "-t", "***", *args])
              if DRY:
                  print(f"  [dry-run] {shown}")
                  return
              r = subprocess.run(cmd, capture_output=True, text=True)
              if r.returncode != 0:
                  print(f"  WARNING: {shown}: {r.stderr.strip()}")

          def vkey(v):
              return [int(p) if p.isdigit() else -1 for p in re.split(r"[._-]", v)]

          packages = [p["name"] for p in api(f"/packages/{ORG}")]
          print(f"{len(packages)} packages on {ORG}\n")

          # 1. master -> main label migration: `anaconda label` operates on
          # the WHOLE org account, not a single package/file, so this is
          # two calls total, not a per-package or per-file loop.
          print("== org-wide: master -> main label migration")
          anaconda("label", "--copy", "master", "main", "--organization", ORG)
          anaconda("label", "--remove", "master", "--organization", ORG)
          print()

          for pkg in sorted(packages):
              data = api(f"/package/{ORG}/{pkg}")
              files = data.get("files", [])
              labels_of, all_labels = {}, set()
              for f in files:
                  ls = set(f.get("labels", []))
                  all_labels |= ls
                  labels_of.setdefault(f.get("version", ""), set()).update(ls)
              print(f"== {pkg}: labels={sorted(all_labels)}")

              # 2. version trim. Only numeric versions count as releases:
              # branch-named junk versions (master/latest/beta/HEAD) from
              # the pre-policy era are trimmed like dev builds -- unless a
              # package has NO numeric release yet, in which case its
              # newest non-dev version is kept so it never vanishes.
              versions = [v for v in labels_of if v]
              releases = sorted(
                  (v for v in versions if "dev" not in v and re.match(r"^\d", v)),
                  key=vkey, reverse=True)
              protect = set(releases[:KEEP_N])
              protect |= {v for v in versions if labels_of[v] - {"main", "master"}}
              if not releases:
                  fallback = [v for v in versions if "dev" not in v]
                  if fallback:
                      protect.add(max(fallback, key=vkey))
              for v in sorted(versions, key=vkey, reverse=True):
                  if v in protect:
                      print(f"  KEEP   {v}  {sorted(labels_of[v])}")
                  else:
                      print(f"  DELETE {v}  {sorted(labels_of[v])}")
                      anaconda("remove", "--force", f"{ORG}/{pkg}/{v}")
          PYEOF
