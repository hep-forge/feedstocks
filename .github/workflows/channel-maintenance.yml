name: Anaconda Channel Maintenance

# Keeps the hep-forge channel small and consistent (free-tier storage):
#
#   1. Label hygiene: any file still carrying the retired `master` label
#      gets `main` added, verified, and ONLY THEN has `master` removed
#      from that exact file. Per-file and verified on purpose: the first
#      version of this workflow used `anaconda label --copy/--remove`,
#      which operates on the WHOLE org account with no per-file scoping
#      (binstar_client/commands/channel.py) and, on its one real run,
#      failed the copy silently while the remove still went through --
#      stripping every master-only file down to ZERO labels, invisible
#      to any `-c hep-forge` install. This talks to the REST API
#      directly (the same POST/DELETE add_channel()/remove_channel()
#      make internally) instead of the anaconda-client CLI, which kept
#      swallowing real error text behind one uninformative log line.
#   2. Version trim, channel-wide: per package keep the newest
#      TRIM_KEEP non-dev versions plus any version carrying a label
#      other than main/master (branch lines like legacy/eic/cern/old,
#      and the explicit `keep` label, applied per-version with
#      `anaconda copy <org>/<pkg>/<version> --from-label main --to-label keep`).
#      Delete the rest, including retired *dev* uploads.
#
# The publish job in each feedstock already trims its own package's
# versions after every release; this sweep additionally catches
# packages that rarely publish and does the master->main label repair.

on:
  schedule:
    - cron: '30 5 * * 1'   # Mondays, after the render-sync run
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only print the plan, change nothing"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Install anaconda-client
        run: pip install anaconda-client

      - name: Label hygiene + version trim
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
          ORG: hep-forge
          TRIM_KEEP: "2"
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: |
          python3 <<'PYEOF'
          import json, os, re, subprocess, urllib.error, urllib.request

          ORG = os.environ["ORG"]
          KEEP_N = int(os.environ["TRIM_KEEP"])
          DRY = os.environ["DRY_RUN"] == "true"
          TOKEN = os.environ["ANACONDA_API_TOKEN"]

          def api(path):
              with urllib.request.urlopen(f"https://api.anaconda.org{path}", timeout=30) as r:
                  return json.load(r)

          def api_write(method, path, payload):
              """Direct REST call -- what add_channel()/remove_channel() do
              internally -- instead of the anaconda-client CLI, whose
              'label' command has no per-file scoping and, on its one
              real-world run here, failed silently (see header)."""
              body = json.dumps(payload).encode()
              if DRY:
                  print(f"  [dry-run] {method} {path} {body.decode()}")
                  return True
              req = urllib.request.Request(
                  f"https://api.anaconda.org{path}", data=body, method=method,
                  headers={"Authorization": f"token {TOKEN}", "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return 200 <= r.status < 300
              except urllib.error.HTTPError as e:
                  print(f"  WARNING: {method} {path}: HTTP {e.code}: {e.read().decode()[:300]}")
                  return False

          def anaconda(*args):
              cmd = ["anaconda", "-t", TOKEN, *args]
              shown = " ".join(["anaconda", "-t", "***", *args])
              if DRY:
                  print(f"  [dry-run] {shown}")
                  return
              r = subprocess.run(cmd, capture_output=True, text=True)
              if r.returncode != 0:
                  print(f"  WARNING: {shown}\n    stdout: {r.stdout.strip()}\n    stderr: {r.stderr.strip()}")

          def vkey(v):
              return [int(p) if p.isdigit() else -1 for p in re.split(r"[._-]", v)]

          packages = [p["name"] for p in api(f"/packages/{ORG}")]
          print(f"{len(packages)} packages on {ORG}\n")

          for pkg in sorted(packages):
              data = api(f"/package/{ORG}/{pkg}")
              files = data.get("files", [])
              labels_of, all_labels = {}, set()
              for f in files:
                  ls = set(f.get("labels", []))
                  all_labels |= ls
                  labels_of.setdefault(f.get("version", ""), set()).update(ls)
              print(f"== {pkg}: labels={sorted(all_labels)}")

              # 1. master -> main label migration, per file and verified:
              # add main, confirm it stuck, ONLY THEN drop master from
              # that exact file. Never remove before add is confirmed.
              for f in files:
                  ls = set(f.get("labels", []))
                  if "master" not in ls:
                      continue
                  version, basename = f["version"], f["basename"]
                  payload = {"package": pkg, "version": version, "basename": basename}
                  if "main" in ls:
                      added = True
                  else:
                      added = api_write("POST", f"/channels/{ORG}/main", payload)
                  if added and not DRY:
                      check = api(f"/package/{ORG}/{pkg}")
                      cur = next((x for x in check.get("files", [])
                                  if x["version"] == version and x["basename"] == basename), None)
                      added = bool(cur and "main" in cur.get("labels", []))
                  if added:
                      api_write("DELETE", f"/channels/{ORG}/master", payload)
                  else:
                      print(f"  WARNING: could not confirm 'main' on {pkg}/{version}/{basename}; leaving 'master' in place")

              # 2. version trim. Only numeric versions count as releases:
              # branch-named junk versions (master/latest/beta/HEAD) from
              # the pre-policy era are trimmed like dev builds -- unless a
              # package has NO numeric release yet, in which case its
              # newest non-dev version is kept so it never vanishes.
              versions = [v for v in labels_of if v]
              releases = sorted(
                  (v for v in versions if "dev" not in v and re.match(r"^\d", v)),
                  key=vkey, reverse=True)
              protect = set(releases[:KEEP_N])
              protect |= {v for v in versions if labels_of[v] - {"main", "master"}}
              if not releases:
                  fallback = [v for v in versions if "dev" not in v]
                  if fallback:
                      protect.add(max(fallback, key=vkey))
              for v in sorted(versions, key=vkey, reverse=True):
                  if v in protect:
                      print(f"  KEEP   {v}  {sorted(labels_of[v])}")
                  else:
                      print(f"  DELETE {v}  {sorted(labels_of[v])}")
                      anaconda("remove", "--force", f"{ORG}/{pkg}/{v}")
          PYEOF
