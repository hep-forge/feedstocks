name: hep-bot version check

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 06:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.HEP_BOT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml packaging

      - name: Configure git identity
        run: |
          git config --global user.name "HEP Bot"
          git config --global user.email "hep-bot@users.noreply.github.com"

      - name: Check upstream versions
        env:
          GITHUB_TOKEN: ${{ secrets.HEP_BOT_TOKEN }}
        run: python scripts/hep_bot/check_versions.py

      - name: Check versions (dry-run summary)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: python scripts/hep_bot/check_versions.py --dry-run
